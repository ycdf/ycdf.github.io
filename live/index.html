<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业导播·数据看板 - 直播中控台·增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --led-green: #2ecc71;
            --led-yellow: #f1c40f;
            --led-red: #e74c3c;
            --led-blue: #3498db;
            --text-gray: #888;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: #fff; font-family: sans-serif; overflow: hidden; }

        header { height: 45px; background: #222; display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid #333; z-index: 100; }
        .nav-btn { padding: 4px 12px; background: #333; cursor: pointer; border-radius: 3px; font-size: 13px; border: none; color: #fff; }
        .nav-btn.active { background: var(--led-blue); font-weight: bold; }

        .main-container { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 45px); padding: 10px; gap: 10px; box-sizing: border-box; }
        .panel { background: var(--panel-bg); border: 1px solid #2a2a2a; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }

        /* 视频区域 */
        .video-box { flex: 1; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .video-logo { position: absolute; top: 15px; left: 15px; width: 80px; opacity: 0.6; pointer-events: none; }
        .video-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 3px; font-size: 12px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #ff4d4d; display: flex; align-items: center; gap: 5px; }
        .badge-dot { width: 8px; height: 8px; background: #ff4d4d; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 音频电平 */
        .audio-section { margin-top: 10px; display: flex; gap: 15px; align-items: center; background: #111; padding: 8px; border-radius: 4px; }
        .meter-track { height: 10px; background: #000; flex: 1; display: flex; gap: 1px; border-radius: 2px; overflow: hidden; }
        .led-segment { flex: 1; height: 100%; background: #222; }

        /* 数据看板与 Iframe 自适应 */
        #page-data { grid-column: span 2; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: 100px 1fr; gap: 10px; }
        .stat-card { text-align: center; justify-content: center; }
        .stat-card h2 { font-size: 24px; margin: 0; font-family: monospace; }
        .chart-container { grid-column: span 3; }

        /* Iframe 容器自适应核心样式 */
        .iframe-wrapper { grid-column: span 1; position: relative; width: 100%; height: 100%; min-height: 300px; background: #000; border-radius: 4px; overflow: hidden; }
        .iframe-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .scroll-box { flex: 1; overflow-y: auto; background: #0c0c0c; padding: 10px; font-size: 12px; line-height: 1.6; }
        .audit-item { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #1a1a1a; }
        .tag { padding: 1px 4px; border-radius: 2px; font-size: 10px; margin-right: 5px; }
        .tag-warn { background: #e67e22; color: #fff; }
        .tag-pass { background: #27ae60; color: #fff; }

        .hidden { display: none !important; }
        .digital-clock { font-family: monospace; font-size: 18px; color: var(--led-green); }
    </style>
</head>
<body>

    <header>
        <button class="nav-btn active" id="btn-live" onclick="showPage('live')">导播总览</button>
        <button class="nav-btn" id="btn-data" onclick="showPage('data')">实时看板</button>
        <div style="margin-left:auto" id="clock" class="digital-clock">0000-00-00 00:00:00</div>
    </header>

    <main class="main-container">
        <section id="page-live" class="panel">
            <h3 style="margin:10 0 10px 0; color: var(--text-gray);">直播中控台 MASTER PROGRAM OUTPUT</h3>
            <div class="video-box">
                <img src="https://go.choong.net/logo.png" class="video-logo">
                <div class="video-badge"><div class="badge-dot"></div>LIVE</div>
                <video id="hlsPlayer" autoplay muted loop playsinline></video>
            </div>
            <div class="audio-section">
                <div style="font-size: 10px; color:var(--text-gray);">AUDIO PGM</div>
                <div style="flex:1">
                    <div class="meter-track" id="meter-L"></div>
                    <div style="height:4px"></div>
                    <div class="meter-track" id="meter-R"></div>
                </div>
            </div>
        </section>

        <section id="sidebar-live" class="panel">
            <h5 style="margin-top:0;">信号调度 (RTMP/HLS)</h5>
            <input type="text" id="streamUrl" 
                   value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" 
                   style="width:100%; background:#000; color:var(--led-green); border:1px solid #333; padding:8px; margin-bottom:10px; box-sizing:border-box; font-size: 11px;">
            <button onclick="changeSource()" style="width:100%; background:var(--led-blue); color:#fff; border:none; padding:8px; cursor:pointer;">重载信号</button>
            
            <div style="margin-top:20px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
                <h5 style="margin-bottom:10px;">智能审核队列 (AI Content Audit)</h5>
                <div class="scroll-box" id="auditBox">
                    </div>
            </div>
        </section>

        <div id="page-data" class="hidden">
            <div class="panel stat-card"><p style="font-size:12px; color:var(--text-gray);">在线峰值</p><h2 id="val-online" style="color:var(--led-blue);">1,284</h2></div>
            <div class="panel stat-card"><p style="font-size:12px; color:var(--text-gray);">转化率 (CVR)</p><h2 style="color:var(--led-green);">4.2%</h2></div>
            <div class="panel stat-card"><p style="font-size:12px; color:var(--text-gray);">推流带宽</p><h2 id="val-kbps" style="color:var(--led-yellow);">6.1 Mbps</h2></div>
            <div class="panel stat-card"><p style="font-size:12px; color:var(--text-gray);">系统健康度</p><h2 style="color:var(--led-green);">STABLE</h2></div>

            <div class="panel chart-container">
                <div id="trendChart" style="width: 100%; height: 100%;"></div>
            </div>

            <div class="iframe-wrapper">
               <!-- <iframe src="https://m.baidu.com" id="conversionFrame"></iframe>-->
               <iframe frameborder="0" src="https://material-vod-tx.vzan.com/live/1725393497/mps/20251211/853d21f5140243069b566a0e6bf2a648/fabc3c936e224d8e976149320dc05d81.m3u8" allowFullScreen="true"></iframe>
            </div>
        </div>
    </main>

    <script>
        // --- 1. 信号源逻辑 (默认循环播放) ---
        let currentHls = null;
        const video = document.getElementById('hlsPlayer');

        function changeSource() {
            const url = document.getElementById('streamUrl').value.trim();
            if (currentHls) { currentHls.destroy(); currentHls = null; }
            
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    currentHls = new Hls({ enableWorker: true, lowLatencyMode: true });
                    currentHls.loadSource(url);
                    currentHls.attachMedia(video);
                    currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                }
            } else {
                video.src = url;
                video.load();
            }
        }

        // --- 2. 真实场景审核队列逻辑 ---
        const auditScenarios = [
            { tag: "PASS", text: "用户 '导播小赵' 弹幕内容合法", type: "pass" },
            { tag: "WARN", text: "检测到敏感词过滤：'***'", type: "warn" },
            { tag: "PASS", text: "画面检测：未发现违规物品", type: "pass" },
            { tag: "INFO", text: "连麦申请：ID_2948 待处理", type: "pass" },
            { tag: "RISK", text: "下行节点延迟波动 > 500ms", type: "warn" },
            { tag: "BLOCK", text: "重复刷屏行为已自动静言", type: "warn" }
        ];

        function updateAuditLog() {
            const box = document.getElementById('auditBox');
            const scene = auditScenarios[Math.floor(Math.random() * auditScenarios.length)];
            const item = document.createElement('div');
            item.className = 'audit-item';
            item.innerHTML = `
                <span style="color:#555">[${new Date().toLocaleTimeString()}]</span>
                <span class="tag ${scene.type === 'warn' ? 'tag-warn' : 'tag-pass'}">${scene.tag}</span>
                <span>${scene.text}</span>
            `;
            box.prepend(item);
            if(box.children.length > 25) box.lastChild.remove();
        }

        // --- 3. 基础功能 (时钟/导航/音频) ---
        function showPage(type) {
            const isLive = type === 'live';
            document.getElementById('page-live').classList.toggle('hidden', !isLive);
            document.getElementById('sidebar-live').classList.toggle('hidden', !isLive);
            document.getElementById('page-data').classList.toggle('hidden', isLive);
            document.getElementById('btn-live').classList.toggle('active', isLive);
            document.getElementById('btn-data').classList.toggle('active', !isLive);
            if(!isLive) setTimeout(() => myChart.resize(), 100);
        }

        function tick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString();
        }

        const LED_COUNT = 30;
        function initMeters() {
            ['meter-L', 'meter-R'].forEach(id => {
                const track = document.getElementById(id);
                for (let i = 0; i < LED_COUNT; i++) {
                    const seg = document.createElement('div');
                    seg.className = 'led-segment';
                    track.appendChild(seg);
                }
            });
        }
        function updateMeters() {
            ['meter-L', 'meter-R'].forEach(id => {
                const segments = document.getElementById(id).children;
                const level = Math.floor(Math.random() * LED_COUNT);
                for (let i = 0; i < LED_COUNT; i++) {
                    segments[i].style.background = i < level ? (i > 25 ? 'var(--led-red)' : i > 18 ? 'var(--led-yellow)' : 'var(--led-green)') : '#222';
                }
            });
        }

        // --- 4. 图表趋势 ---
        const myChart = echarts.init(document.getElementById('trendChart'), 'dark');
        let dataSeries = Array(24).fill(0).map(() => Math.floor(Math.random() * 500 + 1000));
        myChart.setOption({
            backgroundColor: 'transparent',
            title: { text: '24H 并发监控 (Real-time Engagement)', textStyle: { fontSize: 12, color: '#888' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: Array(24).fill('') },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#222' } } },
            series: [{ type: 'line', smooth: true, symbol: 'none', areaStyle: { color: 'rgba(52,152,219,0.1)' }, lineStyle: { width: 1 }, data: dataSeries }]
        });

        // 定时更新
        window.onload = () => {
            initMeters();
            changeSource();
            setInterval(tick, 1000);
            setInterval(updateMeters, 100);
            setInterval(updateAuditLog, 2000);
            setInterval(() => {
                dataSeries.shift(); dataSeries.push(dataSeries[dataSeries.length-1] + Math.floor(Math.random()*50-25));
                myChart.setOption({ series: [{ data: dataSeries }] });
            }, 3000);
        };
        window.onresize = () => myChart.resize();
    </script>
</body>
</html>
